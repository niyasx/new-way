# Example Nginx server block for New Way Consultancy PHP site
# Adjust server_name, root, and SSL paths for your environment.

server {
    listen 80;
    listen [::]:80;
    server_name new-way.in www.new-way.in;

    root /var/www/new-way/public;
    index index.php;

    charset utf-8;
    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/new-way-access.log;
    error_log /var/log/nginx/new-way-error.log;
}
